<div class="donut-wrapper">


  <div class="chart-wrapper">
    <ngx-charts-pie-chart
      [view]="[140, 140]"
      [results]="results"
      [scheme]="colorScheme"
      [doughnut]="true"
      [arcWidth]="0.7"
      [legend]="false"
      [labels]="false"
      [tooltipDisabled]="true"
    >
    </ngx-charts-pie-chart>
  </div>

  <div class="center-text">{{ percentage }}%</div>
</div>
