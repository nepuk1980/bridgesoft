<mat-dialog-actions align="end" class="popupclose">
  <img mat-dialog-close src="/svg/close.svg" alt="close" />
</mat-dialog-actions>

<div class="popup-content">
  <h6 mat-dialog-title class="popup-title">Add Access</h6>

  <div class="popup-table">
    <!-- Search -->
    <div class="search-filter-div">
      <div class="search-box">
        <input type="text" placeholder="Search" (keyup)="applyFilter($event)" />
        <img src="/svg/search.svg" class="search-icon" />
      </div>
      <div class="custom-filter">
        <mat-form-field>
          <mat-label>Filter</mat-label>
          <mat-select
            [(ngModel)]="selectedType"
            (selectionChange)="applyFilter()"
            panelClass="custom-filter-panel"
          >
            <mat-option value="">Filter</mat-option>

            <!-- ✅ dynamic types -->
            <mat-option *ngFor="let type of types" [value]="type">
              {{ type }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <mat-dialog-content class="dialog-content">
      <table mat-table [dataSource]="dataSource" matSort>
        <!-- NAME COLUMN -->
        <ng-container matColumnDef="name">
          <!-- HEADER -->
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <mat-checkbox
              (change)="toggleAllRows()"
              [checked]="isAllSelected()"
              [indeterminate]="selection.hasValue() && !isAllSelected()"
            >
            </mat-checkbox>

            {{ data?.fileicon ? "File" : "Folder" }} Names
          </th>

          <!-- ROW -->
          <td mat-cell *matCellDef="let element">
            <div class="icontd">
              <mat-checkbox
                (click)="$event.stopPropagation()"
                (change)="selection.toggle(element)"
                [checked]="selection.isSelected(element)"
              >
              </mat-checkbox>

              <img src="/svg/folder.svg" class="folder-icon" />
              {{ element.name }}
            </div>
          </td>
        </ng-container>

        <!-- CATEGORY -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Categories</th>
          <td mat-cell *matCellDef="let element">
            {{ element.category }}
          </td>
        </ng-container>

        <!-- CREATED -->
        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="lastcol">
            Created On
          </th>
          <td mat-cell *matCellDef="let element" class="lastcol">
            {{ element.created }}
          </td>
        </ng-container>

        <!-- TABLE ROWS -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- NO DATA -->
        <tr *matNoDataRow>
          <td colspan="3" class="no-data">
            No {{ data?.fileicon ? "files" : "folders" }} found
          </td>
        </tr>
      </table>
    </mat-dialog-content>
    <mat-dialog-actions align="end" class="forwardbtn">
      <button mat-dialog-close mat-flat-button class="btn-blue">
        Add Selected
      </button>
    </mat-dialog-actions>
  </div>
</div>
