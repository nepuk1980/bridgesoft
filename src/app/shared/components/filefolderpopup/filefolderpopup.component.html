<mat-dialog-actions align="end" class="popupclose">
  <img mat-dialog-close src="/svg/close.svg" />
</mat-dialog-actions>

<div class="popup-content">
  <h6 mat-dialog-title class="popup-title">
    {{ data.title }}
  </h6>

  <p>Total {{ data.fileicon ? "Files" : "Folders" }}: {{ data.value }}</p>

  <div class="popup-table">
    <div class="search-box">
      <input type="text" placeholder="Search" (keyup)="applyFilter($event)" />
      <img src="/svg/search.svg" class="search-icon" />
    </div>
    <mat-dialog-content class="dialog-content">
      <table mat-table [dataSource]="dataSource" matSort>
        <!-- Folder Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>
            {{ data.fileicon ? "File" : "Folder" }} Names
          </th>
          <td mat-cell *matCellDef="let element">
            <div class="icontd">
              <img [src]="data.icon" class="folder-icon" />
              {{ element.name }}
            </div>
          </td>
        </ng-container>

        <!-- Category -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Categories</th>
          <td mat-cell *matCellDef="let element">
            {{ element.category }}
          </td>
        </ng-container>

        <!-- Created -->
        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="lastcol">
            Created On
          </th>
          <td mat-cell *matCellDef="let element" class="lastcol">
            {{ element.created }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- No Data Message -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" colspan="3">No folders found</td>
        </tr>
      </table>
    </mat-dialog-content>
  </div>
</div>
