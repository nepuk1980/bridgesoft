<app-innerheader
  title="Alerts"
  [btn]="false"
  btntitle="Back To Dashboard"
></app-innerheader>

<div class="mainWrapper">
  <div class="solid-table table-wrapper">
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="custom-table">
        <!-- Resource Path -->
        <ng-container matColumnDef="altername">
          <th mat-header-cell *matHeaderCellDef>Alter Name</th>
          <td mat-cell *matCellDef="let element">
            {{ element.altername }}
          </td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let element">
            {{ element.description }}
          </td>
        </ng-container>

        <!-- Category -->
        <ng-container matColumnDef="folders">
          <th mat-header-cell *matHeaderCellDef>Folders</th>
          <td mat-cell *matCellDef="let element">
            {{ element.folders }}
          </td>
        </ng-container>
        <ng-container matColumnDef="files">
          <th mat-header-cell *matHeaderCellDef>Files</th>
          <td mat-cell *matCellDef="let element">
            {{ element.files }}
          </td>
        </ng-container>
        <ng-container matColumnDef="users">
          <th mat-header-cell *matHeaderCellDef>Users</th>
          <td mat-cell *matCellDef="let element">
            {{ element.users }}
          </td>
        </ng-container>

        <!-- Action -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="lastcol">Action</th>
          <td mat-cell *matCellDef="let element" class="lastcol">
            <div class="edit-delete-td">
              <button mat-icon-button>
                <img src="/svg/edit.svg" alt="edit" class="editico" />
              </button>
              <button mat-icon-button>
                <img src="/svg/copy.svg" alt="copy" class="editico" />
              </button>
              <button mat-icon-button (click)="delete(element)">
                <img src="/svg/delete.svg" alt="delete" class="deleteico" />
              </button>
            </div>
          </td>
        </ng-container>

        <!-- Rows -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            No data found
          </td>
        </tr>
      </table>
    </div>
  </div>
</div>
<div class="fixed-btn">
  <button mat-flat-button routerLink="alerts-configuration" class="btn-blue">
    Create A New Alert
  </button>
</div>
