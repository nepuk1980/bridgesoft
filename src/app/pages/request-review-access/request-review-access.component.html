<app-innerheader
  title="Review Access"
  [btn]="true"
  btntitle="Back To Request Access"
></app-innerheader>

<div class="mainWrapper">
  <div class="fixed-search-div">
    <div class="search-filter-div">
      <div class="search-box">
        <input
          type="text"
          placeholder="Search"
          (input)="applyFilter($any($event.target).value)"
        />
        <img src="/svg/search.svg" class="search-icon" />
      </div>

      <p>Showing {{ filteredCount }} of {{ totalCount }}</p>
    </div>

    <mat-chip-set class="custonChip">
      <mat-chip-row *ngFor="let user of users" (removed)="remove(user)">
        {{ user }}
        <button matChipRemove>
          <mat-icon>close</mat-icon>
        </button>
      </mat-chip-row>
    </mat-chip-set>
  </div>

  <div class="solid-table table-wrapper">
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="custom-table">
        <!-- Resource Path -->
        <ng-container matColumnDef="resourcePath">
          <th mat-header-cell *matHeaderCellDef>Resource Full Path</th>
          <td mat-cell *matCellDef="let element">
            {{ element.resourcePath }}
          </td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Folder / File Name</th>
          <td mat-cell *matCellDef="let element">
            <div class="icontexttd">
              <img
                src="/svg/folder.svg"
                *ngIf="element.type === 'folder'"
                class="folderico"
              />
              <img
                src="/svg/file.svg"
                *ngIf="element.type === 'file'"
                class="fileico"
              />
              {{ element.name }}
            </div>
          </td>
        </ng-container>

        <!-- Category -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let element">
            {{ element.category }}
          </td>
        </ng-container>

        <!-- Access -->
        <ng-container matColumnDef="access">
          <th mat-header-cell *matHeaderCellDef>Access Level</th>
          <td mat-cell *matCellDef="let element">
            <ng-container *ngIf="!element.access.fullControl">
              <mat-checkbox [checked]="element.access.modify"
                >Modify</mat-checkbox
              >
              <mat-checkbox [checked]="element.access.read">Read</mat-checkbox>
              <mat-checkbox [checked]="element.access.write"
                >Write</mat-checkbox
              >
            </ng-container>

            <ng-container *ngIf="element.access.fullControl">
              <mat-checkbox checked>Full Control</mat-checkbox>
            </ng-container>
          </td>
        </ng-container>

        <!-- Action -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="lastcol">Action</th>
          <td mat-cell *matCellDef="let element" class="lastcol">
            <div class="edit-delete-td">
              <button mat-icon-button routerLink="../request-access-detail">
                <img src="/svg/edit.svg" alt="edit" class="editico" />
              </button>
              <button mat-icon-button (click)="delete(element)">
                <img src="/svg/delete.svg" alt="delete" class="deleteico" />
              </button>
            </div>
          </td>
        </ng-container>

        <!-- Rows -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            No data found
          </td>
        </tr>
      </table>
    </div>
  </div>
</div>

<div class="fixed-btn">
  <button (click)="submit()" mat-flat-button class="btn-blue">Submit</button>
</div>
