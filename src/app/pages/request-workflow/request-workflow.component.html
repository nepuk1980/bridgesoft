<app-innerheader
  title="Review Access"
  [btn]="false"
  btntitle="Back To Request Access"
></app-innerheader>

<div class="mainWrapper">
  <ng-container>
    <div class="search-filter-div">
      <!-- 🔍 Search -->
      <div class="search-box">
        <input
          #searchInput
          type="text"
          placeholder="Search"
          (input)="onSearch(searchInput.value)"
        />
        <img src="/svg/search.svg" class="search-icon" />
      </div>

      <!-- 🔢 Count -->
      <p>Showing {{ showingCount }} of {{ totalCount }}</p>

      <div class="filter-grp-div">
        <div class="custom-filter no-icon">
          <mat-form-field>
            <mat-label>Download</mat-label>
            <mat-select
              [(ngModel)]="selectedDownload"
              panelClass="custom-filter-panel"
            >
              <mat-option value="download">Download</mat-option>
              <mat-option value="pdf" (click)="downloadPDF()"
                ><div class="icontexttd">
                  <img src="/svg/pdf.svg" class="icons" alt="pdf" /> PDF
                </div></mat-option
              >
              <mat-option value="excel" (click)="downloadExcel()"
                ><div class="icontexttd">
                  <img src="/svg/excel.svg" class="icons" alt="excel" /> Excel
                </div></mat-option
              >
              <mat-option value="csv" (click)="downloadCSV()"
                ><div class="icontexttd">
                  <img src="/svg/csv.svg" class="icons" alt="csv" /> CSV
                </div></mat-option
              >
            </mat-select>
          </mat-form-field>
        </div>
        <!-- Category Filter -->
        <div class="custom-filter no-icon">
          <mat-form-field>
            <mat-label>Select Category</mat-label>
            <mat-select
              panelClass="custom-filter-panel"
              (selectionChange)="filterCategory($event.value)"
            >
              <mat-option *ngFor="let cat of categoriesImportant" [value]="cat">
                {{ cat }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <!-- Type Filter -->
        <div class="custom-filter">
          <mat-form-field>
            <mat-label>Filter</mat-label>
            <mat-select
              panelClass="custom-filter-panel"
              (selectionChange)="filterCriticality($event.value)"
            >
              <mat-option value="Open">Open</mat-option>
              <mat-option value="Important">Important</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>
    </div>

    <div class="solid-table table-wrapper">
      <table
        mat-table
        [dataSource]="dataSourceImportant"
        class="mat-elevation-z2"
      >
        <!-- Folder/File Name -->
        <ng-container matColumnDef="folderFileName">
          <th mat-header-cell *matHeaderCellDef>
            <div class="checktddiv">
              <mat-checkbox
                (change)="toggleAllRows()"
                [checked]="isAllSelected()"
                [indeterminate]="isIndeterminate()"
              ></mat-checkbox>

              <span>Folder / File Name</span>
            </div>
          </th>

          <td mat-cell *matCellDef="let row">
            <div class="checktddiv">
              <mat-checkbox
                (click)="$event.stopPropagation()"
                (change)="toggleRow(row)"
                [checked]="selection.has(row)"
              ></mat-checkbox>

              <span>
                <a routerLink="/review-access/sod-detail" class="table-link">
                  {{ row.folderFileName }}
                </a>
              </span>
            </div>
          </td>
        </ng-container>

        <!-- Resource Path -->
        <ng-container matColumnDef="resourceFullPath">
          <th mat-header-cell *matHeaderCellDef>Resource Full Path</th>
          <td mat-cell *matCellDef="let row">
            {{ row.resourceFullPath }}
          </td>
        </ng-container>

        <!-- Category -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let row">
            <div class="icontexttd">
              <img src="/svg/folder.svg" />
              {{ row.category }}
            </div>
          </td>
        </ng-container>

        <!-- Criticality -->
        <ng-container matColumnDef="criticality">
          <th mat-header-cell *matHeaderCellDef>Criticality</th>
          <td mat-cell *matCellDef="let row">
            <div class="form-control">
              <mat-radio-group
                class="customRadio"
                [(ngModel)]="row.criticality"
                (change)="onCriticalityChange(row)"
              >
                <mat-radio-button value="Open">Open</mat-radio-button>
                <mat-radio-button value="Important">Important</mat-radio-button>
              </mat-radio-group>
            </div>
          </td>
        </ng-container>

        <!-- HEADER -->
        <tr mat-header-row *matHeaderRowDef="displayedColumnsImportant"></tr>

        <!-- ROW -->
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumnsImportant"
          (click)="toggleRow(row)"
        ></tr>

        <!-- NO DATA -->
        <tr class="mat-row" *matNoDataRow>
          <td
            class="mat-cell"
            [attr.colspan]="displayedColumnsImportant.length"
            style="text-align: center; padding: 20px"
          >
            No data found
          </td>
        </tr>
      </table>
    </div>
  </ng-container>
</div>

<div class="fixed-btn">
  <button
    routerLink="../request-access-detail"
    mat-flat-button
    class="btn-blue"
  >
    Submit
  </button>
</div>
